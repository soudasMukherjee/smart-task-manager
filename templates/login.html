<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf8ff;
            background-image: radial-gradient(at 0% 0%, rgba(67, 85, 185, 0.05) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(51, 160, 253, 0.05) 0px, transparent 50%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Login Container -->
<main class="w-full max-w-[480px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-lg flex flex-col items-center gap-xs">
<div class="w-12 h-12 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">task_alt</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary">TaskFlow</h1>
</div>
<!-- Auth Card -->
<div class="w-full bg-surface-container-lowest rounded-[24px] p-8 md:p-10 shadow-[0_12px_48px_rgba(0,0,0,0.06)] border border-outline-variant/30">
<header class="mb-lg">
<h2 class="font-headline-lg text-headline-lg text-on-background mb-base">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to stay on top of your professional goals.</p>
</header>
<form class="space-y-md" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface rounded-xl border border-outline-variant text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-body-md text-body-md" id="email" name="username" placeholder="name@company.com" type="text" required/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center ml-1">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3 bg-surface rounded-xl border border-outline-variant text-on-surface placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary/10 focus:border-primary transition-all font-body-md text-body-md" id="password" name="password" placeholder="••••••••" type="password" required/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface-variant" type="button" aria-label="Toggle password visibility">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-xs ml-1 py-1">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/20" id="remember" type="checkbox"/>
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer select-none" for="remember">Remember me for 30 days</label>
</div>
<!-- Error Box -->
<div id="error" class="hidden font-body-md text-body-md text-error" style="margin-top:8px;"></div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-xl shadow-lg shadow-primary/10 hover:bg-primary-container hover:-translate-y-0.5 active:scale-95 transition-all duration-200 mt-base" type="submit">
                    Sign In to Dashboard
                </button>
</form>
<!-- Social/Secondary Login Separator -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/40"></div>
</div>
<div class="relative flex justify-center text-label-sm uppercase tracking-wider">
<span class="px-4 bg-surface-container-lowest text-outline">Or continue with</span>
</div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-xs px-4 py-3 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface-variant" type="button">
<img alt="Google" class="w-5 h-5" data-alt="A clean, high-resolution rendering of the Google G logo icon on a transparent background. The image is crisp, professional, and fits perfectly within a corporate software interface, adhering to a minimalist and high-key lighting aesthetic that matches a light mode UI." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4Yxt5mgR4LXC6MXW_n9FodVrZW89Y0w5Bx-w-hH1NMAP0eGKMD7tT1LJ-fe1LDzACcYsgzus471hfgOfAoUiv_iNrbh5Xnw5z7-E8IF6eKbLSxAgIj6ti7XqI6LjatGCyUsFpPUJNLakeO_zj0Lajd2KTht4oHaU3S5N2W0aEFk9u42kahTWvBJB3ocq0dPCN68wMdn1ARAvriduCNCo4z2s_5YJykyY5-u1zYW_M-ElDUonhPu82ti9npLjieas1tICsfDkvgN_I"/>
                    Google
                </button>
<button class="flex items-center justify-center gap-xs px-4 py-3 border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors font-label-md text-label-md text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">brand_awareness</span>
                    SSO
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-lg font-body-md text-body-md text-on-surface-variant text-center">
            Don't have an account?
            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30" href="/register">Sign Up</a>
</p>
</main>
<!-- Visual Decorative Element (Asymmetric Backdrop) -->
<div class="fixed -z-10 top-0 right-0 w-1/3 h-1/2 opacity-20 pointer-events-none">
<div class="absolute top-20 right-20 w-64 h-64 bg-secondary-container rounded-full blur-[120px]"></div>
</div>
<div class="fixed -z-10 bottom-0 left-0 w-1/3 h-1/2 opacity-20 pointer-events-none">
<div class="absolute bottom-20 left-20 w-80 h-80 bg-primary-container rounded-full blur-[120px]"></div>
</div>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body></html>
